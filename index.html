<style>

  }

    font-size: 15px;

  }

    height: 28px;

    justify-content: center;

    box-shadow: 0 0 20px rgba(233, 30, 99, 0.1);
  }
  .opt.selected .letter {

    color: #fff;
  }
  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }
  .btn-group .btn {
    flex: 1;
  }
  .btn {
    padding: 14px;
    border: none;
    border-radius: 50px;
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #c2185b, #6a1b9a);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(233, 30, 99, 0.2);
    text-align: center;

  .btn:active {
    transform: scale(0.96);
    opacity: 0.9;
  }
  .btn:disabled {
    opacity: 0.4;
    transform: none;
    pointer-events: none;
  }
  .btn-secondary {
    background: rgba(200, 150, 180, 0.15);
    box-shadow: none;
    color: #d0b8cc;
  }
  .btn-secondary:active {
    background: rgba(200, 150, 180, 0.25);
  }

    flex-direction: column;
    justify-content: center;

    function findBestMatch(userDigits, userLetters) {
      const candidates = roleMap[userDigits] || [];
      if (candidates.length === 0) return null;
      let best = candidates[0];
      let maxMatch = -1;
      for (const candidate of candidates) {
        let matchCount = 0;
        for (let i = 0; i < 4; i++) {
          if (userLetters[i] === candidate.letters[i]) matchCount++;
        }
        if (matchCount > maxMatch) {
          maxMatch = matchCount;
          best = candidate;
        }
      }
      return best;
    }

    // ---------- DOM ----------
    const cover = document.getElementById('cover');
    const quizArea = document.getElementById('quizArea');
    const resultArea = document.getElementById('resultArea');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const qText = document.getElementById('qText');
    const optionsDiv = document.getElementById('options');
    const fill = document.getElementById('fill');
    const counter = document.getElementById('counter');
    const roleName = document.getElementById('roleName');
    const roleDesc = document.getElementById('roleDesc');
    const roleImg = document.getElementById('roleImg');
    const roleTagsEl = document.getElementById('roleTags');

    let current = 0;
    let answers = [];
    let codeDigits = [];
    let chartInstance = null;

    function showCover() {
      cover.classList.remove('hidden');
      quizArea.classList.add('hidden');
      resultArea.classList.add('hidden');
    }

    function showQuiz() {
      cover.classList.add('hidden');
      quizArea.classList.remove('hidden');
      resultArea.classList.add('hidden');
      render();
    }

    function renderRadar(role) {
      const canvas = document.getElementById('radarChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      if (chartInstance) { chartInstance.destroy();
        chartInstance = null; }

      const radarData = roleRadar[role] || { 行动力: 50, 影响力: 50, 稳定性: 50, 共情力: 50, 叛逆度: 50 };
      const labels = ['行动力', '影响力', '稳定性', '共情力', '叛逆度'];
      const values = [radarData.行动力, radarData.影响力, radarData.稳定性, radarData.共情力, radarData.叛逆度];

      chartInstance = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: labels,
          datasets: [{
            label: role,
            data: values,
            backgroundColor: 'rgba(233, 30, 99, 0.2)',
            borderColor: '#e91e63',
            borderWidth: 2,
            pointBackgroundColor: '#e91e63',
            pointBorderColor: '#fff',
            pointBorderWidth: 1,
            pointRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function(context) { return context.parsed.r + '/100'; } } }
          },
          scales: {
            r: {
              beginAtZero: true,
              max: 100,
              ticks: { stepSize: 20, display: false },
              grid: { color: 'rgba(255,255,255,0.08)' },
              angleLines: { color: 'rgba(255,255,255,0.08)' },
              pointLabels: { color: '#d0b8cc', font: { size: 11, weight: '600' } }
            }
          }
        }
      });
    }

    function showResult() {
      cover.classList.add('hidden');
      quizArea.classList.add('hidden');
      resultArea.classList.remove('hidden');

      const codeStr = codeDigits.join('');
      const userLetters = answers.map(idx => String.fromCharCode(65 + idx)).join('');
      const best = findBestMatch(codeStr, userLetters);
      const role = best ? best.name : "未知角色";

      roleName.textContent = role;
      roleDesc.textContent = roleDescriptions[role] || '你是彭格列家族中不可或缺的一员。';

      // 头像
      if (role === "山本武") {
        const imgUrl = `https://kjppp123.github.io/family-test/山本武.jpg`;
        roleImg.src = imgUrl;
        roleImg.onload = function() { this.style.display = 'block'; };
        roleImg.onerror = function() { this.style.display = 'none'; };
      } else {
        roleImg.style.display = 'none';
      }

      // 标签
      const tags = roleTags[role] || ["彭格列", "守护者", "家族", "信念"];
      roleTagsEl.innerHTML = tags.map(t => `<span>${t}</span>`).join('');

      // 雷达图
      setTimeout(() => { renderRadar(role); }, 200);
    }

    function render() {
      if (current >= questions.length) { showResult(); return; }
      const q = questions[current];
      qText.textContent = q.q;
      optionsDiv.innerHTML = '';
      q.options.forEach((optText, idx) => {
        const div = document.createElement('div');
        div.className = 'opt';
        div.innerHTML = `<span class="letter">${String.fromCharCode(65 + idx)}</span><span>${optText.substring(2)}</span>`;
        div.dataset.idx = idx;
        div.onclick = () => selectOption(idx);
        optionsDiv.appendChild(div);
      });
      if (answers[current] !== undefined) {
        const btns = optionsDiv.querySelectorAll('.opt');
        btns[answers[current]]?.classList.add('selected');
      }
      fill.style.width = ((current / questions.length) * 100) + '%';
      counter.textContent = `${current + 1}/${questions.length}`;

      prevBtn.style.display = current === 0 ? 'none' : 'block';
      nextBtn.textContent = (current === questions.length - 1) ? '查看结果' : '下一题';
      nextBtn.disabled = (answers[current] === undefined);
    }

    function selectOption(idx) {
      answers[current] = idx;
      codeDigits[current] = idx < 3 ? 1 : 2;
      document.querySelectorAll('.opt').forEach((el, i) => {
        el.classList.toggle('selected', i === idx);
      });
      nextBtn.disabled = false;
    }

    // ---------- 事件绑定 ----------
    startBtn.addEventListener('click', showQuiz);

    resetBtn.addEventListener('click', function() {
      if (chartInstance) { chartInstance.destroy();
        chartInstance = null; }
      current = 0;
      answers = [];
      codeDigits = [];
      showCover();
    });

    prevBtn.addEventListener('click', function() {
      if (current > 0) { current--;
        render(); }
    });

    nextBtn.addEventListener('click', function() {
      if (answers[current] === undefined) { alert('请先选择一个选项～'); return; }
      current++;
      if (current >= questions.length) {
        showResult();
      } else {
        render();
      }
    });

    // ---------- 启动 ----------
    showCover();
  </script>
